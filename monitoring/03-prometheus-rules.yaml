apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  delivery.yml: |
    groups:
      - name: service-health
        interval: 15s
        rules:
          # A deployment that reports fewer ready replicas than desired is the
          # signal a rollout has stalled — the same condition the pipeline's
          # `rollout status` blocks on, observed independently.
          - alert: ServiceHasUnreadyReplicas
            expr: |
              sum by (namespace, service) (up{service!=""}) == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.service }} has no reachable instances in {{ $labels.namespace }}"
              runbook: "Check `kubectl -n {{ $labels.namespace }} get pods -l app.kubernetes.io/name={{ $labels.service }}` and recent rollout history."

          - alert: TargetDown
            expr: up == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Scrape target {{ $labels.instance }} is down"
              runbook: "Verify the pod is Running and its /metrics endpoint responds."

      - name: delivery-signals
        interval: 30s
        rules:
          # Error budget style signal: proportion of 5xx responses.
          - alert: HighErrorRate
            expr: |
              sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
                /
              sum by (service) (rate(http_requests_total[5m])) > 0.05
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.service }} is serving >5% 5xx over 5m"
              runbook: "Correlate with app_build_info to identify the deployed commit, then consider `kubectl rollout undo`."

          - alert: LatencyP95Degraded
            expr: |
              histogram_quantile(0.95,
                sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))
              ) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.service }} p95 latency above 500ms"
              runbook: "Check resource limits and recent deploys; app_build_info carries the responsible commit."

          # Fires when a new build appears — a deploy is an event worth seeing
          # on the same timeline as the metrics it may have changed.
          - alert: NewBuildDeployed
            expr: changes(app_build_info[5m]) > 0
            labels:
              severity: info
            annotations:
              summary: "{{ $labels.service }} now serving build {{ $labels.build_number }} ({{ $labels.commit }})"
