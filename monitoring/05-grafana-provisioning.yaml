apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  # Datasource is provisioned as code — no click-ops, and the deployment is
  # reproducible from this repository alone.
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s

  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: delivery
        orgId: 1
        folder: Delivery
        type: file
        disableDeletion: true
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/dashboards
